    bio: "Victor Grimblatt has an engineering diploma in microelectronics from Institut Nationale Polytechniquede Grenoble (INPG - France) and an electronic engineering diploma from Universidad Tecnica Federico Santa Maria (Chile). He got his PhD on Electronics in 2021 from University of Bordeaux. He is currently R&D Executive Director and General Manager of Synopsys Chile. He has published several papers in IoT, EDA, Smart Agriculture, Climate Change, and embedded systems development. From 2012 to 2024 he was chair of the IEEE Chilean join chapter EDS/CASS/SSCS. He has been part of several conferences TCP (ISCAS, ICECS, LASCAS, VLSI SoC) and Steering Committees. He was member of the IEEE CASS Board of Governors for the period 2021 - 2023. He founded the Electronics for Agrifood SIG at CASS and chaired it until 2024. He was Chair of LASCAS Steering Committee from 2018 to2022. He was CASS representative at the IEEE Climate Change TAB. He is member of the IEEE CASS Board of Governors for the period 2025 - 2027.He was President of the Chilean Electronic and Electrical Industry Association (AIE) from 2017 to 2021.From 2006 to 2008 he was member of the “Chilean Offshoring Committee” organized by the Minister of Economy of Chile. In 2010 he was awarded as “Innovator of the Year in Services Export”. In 2022 he was awarded as “IEEE/AIE Best Engineer” in Chile. In 2023 he was awarded as IEEE R9 Outstanding Engineer”. In 2024 he was awarded as “2024 CASS Meritorious Service Award”. Victor's research areas are EDA (Electronic Design Automation), Climate Change, and IoT for Smart Agriculture."
    keynote_title: "Low Power IC Design for a Sustainable World"
    abstract: "In an era where sustainability is essential, designing low-power integrated circuits (ICs) plays a crucial role in reducing energy consumption and mitigating environmental impact. This talk examines innovative strategies in low-power IC design to meet the increasing demand for energy-efficient electronics, from IoT devices to large-scale computing systems. By utilizing advanced techniques such as subthreshold operation, power gating, clock gating, and dynamic voltage scaling, we outline a framework for optimizing performance while minimizing power dissipation. The discussion emphasizes the interplay between circuit-level innovations, such as the strategic use of clock gating to reduce dynamic power in idle states, process technology advancements, and system-level integration, highlighting their collective contribution to sustainability. Through simulations and case studies, we demonstrate how these approaches can significantly lower the carbon footprint of electronic systems, paving the way for greener technology solutions that align with global sustainability goals."
