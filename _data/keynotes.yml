    keynote_title: "What is the IP Reuse Trap for Digital Hardware, and how can it be escaped?"
    abstract: "Despite its theoretical high productivity impact, IP reuse (intellectual property reuse) in semiconductor design—the practice of using pre-designed digital hardware blocks (like processor cores, interface components, …) in new System-on-a-Chip (SoC) projects—frequently fails to work as expected in industry due to several causes:\n
      -	High integration complexity, including reading and understanding (often incomplete) documentation, physical dependencies between IP and environment, and finding the right configuration\n
      -	The IP only mostly fits, but changes in the IP are needed due to lacking features, adaptation to meet different PPA constraints, and to use the IP in different technologies.\n
      -	IP development is costly and takes more time for development than non-reusable components.\n
      Reasons are manifold:\n
      -	Interfaces even to widely used buses like AHB allow many variations, resulting in a very high space of options.\n
      -	RTL synthesis capabilities are limited; QoS—quality of source—is still the dominating principle. Different PPA constraints require re-architecting and re-implementing to satisfy them.\n
      -	Also, different power-down, security, and safety constraints require modifying IPs.\n
      -	Lastly, a verified IP must be verified and, more importantly, validated in its environment: Does the IP provide the intended functionality to the overall system?\n
      The talk addresses these challenges from semiconductor industry's point of view. It first introduces these and some other challenges. An elaboration of methods dealing with the challenges, such as platform-based design, IP generation as well as hardware generation languages, and automated interface adoption, follows. It closes with the discussion of whether we are reusing the right things and in the right way."