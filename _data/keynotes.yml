    bio: "Freddy Gabbay is a Professor and head of the VLSI Systems Lab at the Institute of Applied Physics at the Hebrew University of Jerusalem. His research interests span VLSI design, microelectronics, computer architecture, machine learning, and domain-specific accelerators. Throughout his career, Prof. Gabbay has contributed to the design and development of advanced semiconductor systems, combining architectural innovation with practical implementation in high-performance computing and communication devices. Prof. Gabbay's professional experience bridges academia and industry, with over two decades of leadership in both domains. He began his career in 1998 as a researcher at Intel's Microprocessor Research Lab. He then joined Mellanox Technologies, where he played a key role in the architecture and ASIC design of high-performance switching products. In 2003, he moved to Freescale Semiconductor as a senior design manager, leading the development of baseband ASIC solutions. He later returned to Mellanox Technologies (now part of NVIDIA) in 2012, where he served as Vice President of Chip Design, overseeing large-scale silicon development programs. In addition to his industrial leadership, Prof. Gabbay is actively engaged in the academic and professional community. He serves as an Associate Editor for IEEE Computer Architecture Letters and as Chairman of the IEEE Computer Society Israel Chapter. He holds 19 patents and is a Senior Member of IEEE. Prof. Gabbay received his B.Sc., M.Sc., and Ph.D. degrees in Electrical Engineering from the Technion - Israel Institute of Technology."
    keynote_title: "Do We Really Need All the Bits? Value-Driven Approximate Computing for AI Accelerators"
    abstract: "Generative AI is reshaping computing, enabling breakthroughs across language, vision, and autonomous systems. However, these models come at a steep cost: they are increasingly limited by compute, memory bandwidth, and energy, pushing modern hardware systems toward fundamental scalability barriers. This keynote presents a value-driven perspective on approximate computing, leveraging the inherent resiliency of deep neural networks to rethink how AI systems are designed. Instead of treating all data uniformly, we prioritize computation and data movement based on their contribution to model accuracy. This enables aggressive optimizations through quantization, decomposition, dynamic approximation, and compression. We will showcase a set of hardware–software co-designed techniques that significantly reduce memory traffic, improve arithmetic intensity, and enhance overall system efficiency. Through case studies, we demonstrate substantial gains in performance, energy efficiency, and memory utilization, while maintaining high model accuracy. Finally, we discuss how value-driven approximate computing reshapes the design space of next-generation AI accelerators, highlighting the central role of co-design in overcoming the memory and energy bottlenecks of large-scale generative AI systems."
